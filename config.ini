[Paths]
; 映射表文件路径（支持相对路径）
mapping_file = rename.xlsx
; 根目录路径（用于解析相对路径，支持相对路径）
root_dir = .
; 备份目录路径（支持相对路径）
backup_dir = backup

[Settings]
; 映射表是否有标题行
has_header = true
; 是否自动执行（不询问）
auto_execute = false
; 是否清理文件名中的非法字符
sanitize_filename = true
; 非法字符替换符
illegal_char_replacement = _
; 是否创建文件备份
create_backup = false
; 路径列索引（从0开始）
path_column = 0
; 原文件名列索引（从0开始）
oldname_column = 1
; 新文件名列索引（从0开始）
newname_column = 2
; 是否启用调试模式
debug_mode = true
; 是否使用COM组件读取加密文件
use_com_for_encrypted = true
; COM应用程序选择：auto, wps, excel
com_application = auto

[Logging]
; 是否启用日志记录
enable_logging = true
; 日志文件路径（支持相对路径）
log_file = rename_log.txt
; 日志级别：DEBUG, INFO, WARNING, ERROR
log_level = DEBUG